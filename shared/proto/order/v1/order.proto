syntax = "proto3";

package order.v1;

option go_package = "OrderService/pkg/order/v1;order_v1";

import "google/api/annotations.proto";

// OrderService предоставляет API для управления жизненным циклом заказов.
service OrderService {
    // CreateOrder создает новый заказ для пользователя.
    rpc CreateOrder(CreateOrderRequest) returns(CreateOrderResponse) {
        option (google.api.http) = {
            post: "/api/v1/orders"
            body: "*"
        };
    }

    // PayOrder инициирует процесс оплаты для существующего заказа.
    rpc PayOrder(PayOrderRequest) returns(PayOrderResponse) {
        option (google.api.http) = {
            post: "/api/v1/orders/{order_uuid}/pay"
            body: "*"
        };
    }

    // GetOrderByUUID возвращает подробную информацию о заказе по его идентификатору.
    rpc GetOrderByUUID(GetOrderByUUIDRequest) returns(GetOrderByUUIDResponse) {
        option (google.api.http) = {
            get: "/api/v1/orders/{order_uuid}"
        };
    }

    // CancelOrder отменяет заказ, если он еще не был оплачен.
    rpc CancelOrder(CancelOrderRequest) returns(CancelOrderResponse) {
        option (google.api.http) = {
            post: "/api/v1/orders/{order_uuid}/cancel"
        };
    }
}

// CancelOrderRequest содержит параметры для отмены заказа.
message CancelOrderRequest {
    // order_uuid - уникальный идентификатор отменяемого заказа.
    string order_uuid = 1; 
}

// CancelOrderResponse возвращает пустой ответ при успешной отмене (204 No Content).
message CancelOrderResponse {
}

// GetOrderByUUIDRequest содержит параметры для запроса информации о заказе.
message GetOrderByUUIDRequest {
    // order_uuid - уникальный идентификатор искомого заказа.
    string order_uuid = 1; 
}

// GetOrderByUUIDResponse содержит полную информацию о заказе.
message GetOrderByUUIDResponse {
    Order order = 1;
}
//Order - заказ, который создает пользователь  
message Order {
    // order_uuid - уникальный идентификатор заказа.
    string order_uuid = 1;
    // user_uuid - идентификатор пользователя, создавшего заказ.
    string user_uuid = 2;
    // part_uuids - список идентификаторов заказанных деталей/товаров.
    repeated string part_uuids = 3;
    // total_price - общая стоимость заказа.
    double total_price = 4;
    // transaction_uuid - идентификатор транзакции оплаты (если есть).
    string transaction_uuid = 5;
    // payment_method - выбранный способ оплаты.
    PaymentMethod payment_method = 6;
    // status - текущий статус заказа.
    string status = 7;
}

// CreateOrderRequest содержит данные, необходимые для создания нового заказа.
message CreateOrderRequest {
    // user_uuid - идентификатор пользователя-покупателя.
    string user_uuid = 1;
    // part_uuids - список идентификаторов товаров для заказа.
    repeated string part_uuids = 2;
}

// CreateOrderResponse возвращает базовую информацию о только что созданном заказе.
message CreateOrderResponse {
    // order_uuid - присвоенный уникальный идентификатор нового заказа.
    string order_uuid = 1;
    // total_price - рассчитанная итоговая стоимость.
    double total_price = 2;
}   

// PayOrderRequest содержит параметры для старта оплаты.
message PayOrderRequest {
    // order_uuid - идентификатор оплачиваемого заказа.
    string order_uuid = 1;
    // payment_method - способ, которым клиент хочет оплатить заказ.
    PaymentMethod payment_method = 2;
}

// PayOrderResponse возвращает информацию о транзакции.
message PayOrderResponse {
    // transaction_uuid - идентификатор созданной платежной транзакции.
    string transaction_uuid = 1;
}

// PaymentMethod описывает доступные способы оплаты в системе.
enum PaymentMethod {
    // UNKNOWN - способ оплаты не указан или неизвестен (значение по умолчанию).
    PAYMENT_METHOD_UNKNOWN = 0;
    // CARD - оплата банковской картой.
    PAYMENT_METHOD_CARD = 1;
    // SBP - оплата через Систему быстрых платежей.
    PAYMENT_METHOD_SBP = 2;
    // CREDIT_CARD - оплата кредитной картой.
    PAYMENT_METHOD_CREDIT_CARD = 3;
    // INVESTOR_MONEY - оплата средствами инвестора.
    PAYMENT_METHOD_INVESTOR_MONEY = 4;
}