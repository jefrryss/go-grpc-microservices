syntax = "proto3";

package inventory.v1;

option go_package = "InventoryService/pkg/inventory/v1;inventory_v1";

import "google/protobuf/timestamp.proto";

// InventoryService — сервис для управления складом деталей.
service InventoryService {
    // GetPart возвращает информацию о детали по её UUID.
    rpc GetPart(GetPartRequest) returns (GetPartResponse);

    // ListParts возвращает список деталей с возможностью фильтрации.
    rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
}

// ListPartsRequest — запрос на получение списка деталей.
message ListPartsRequest {
    PartsFilter filter = 1;
}

// ListPartsResponse — ответ со списком найденных деталей.
message ListPartsResponse {
    repeated Part parts = 1;
}

// PartsFilter — фильтр для поиска деталей.
message PartsFilter {
    repeated string uuids = 1;
    repeated string names = 2;
    repeated Category categories = 3;
    repeated string manufacturer_countries = 4;
    repeated string tags = 5;
}

// GetPartRequest — запрос на получение детали по её UUID.
message GetPartRequest {
    // uuid — уникальный идентификатор детали
    string uuid = 1;
}

// GetPartResponse — ответ на запрос получения детали.
message GetPartResponse {
    Part part = 1;
}

// Part — структура, описывающая деталь космического корабля.
message Part {
    string uuid = 1;
    string name = 2;
    string description = 3;
    double price = 4;
    int64 stock_quantity = 5;
    Category category = 6;
    
    Dimensions dimensions = 7;
    Manufacturer manufacturer = 8;
    repeated string tags = 9;
    map<string, Value> metadata = 10;
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
}

// Value — контейнер для хранения гибких метаданных одного из четырех типов.
message Value {
    oneof kind {
        string string_value = 1;
        int64 int64_value = 2;
        double double_value = 3;
        bool bool_value = 4;
    }
}

// Manufacturer — информация о компании, создавшей деталь.
message Manufacturer {
    string name = 1;
    string country = 2;
    string website = 3;
}

// Dimensions — физические характеристики и габариты детали.
message Dimensions {
    double length = 1;
    double width = 2;
    double height = 3;
    double weight = 4;
}

// Category — перечисление доступных категорий деталей космического корабля.
enum Category {
    // Неизвестная категория или категория не указана
    CATEGORY_UNSPECIFIED = 0;
    
    // Двигатели и элементы двигательной установки
    CATEGORY_ENGINE = 1;
    
    // Топливные баки и системы подачи топлива
    CATEGORY_FUEL = 2;
    
    // Иллюминаторы и смотровые окна
    CATEGORY_PORTHOLE = 3;
    
    // Крылья и аэродинамические элементы обшивки
    CATEGORY_WING = 4;
}